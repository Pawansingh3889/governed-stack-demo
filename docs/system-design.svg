<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <title>Governed Agent Stack — system design</title>
  <desc>A layered on-prem system design. A local client (Open WebUI plus Ollama) calls the governance gateway over HTTP with a bearer token. The gateway authenticates the token to a role, asks OPA for an allow or deny decision, applies a per-role budget, and audits, then forwards allowed calls to mcpo on an internal port. mcpo spawns five MCP servers over stdio, each enforcing its own gate before its backend store. A cross-cutting rail of in-tool governance (query-warden, pii-veil, agent-blackbox) sits under the tools. A six-step request lifecycle runs along the bottom.</desc>

  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5eead4"/><stop offset="0.45" stop-color="#60a5fa"/><stop offset="0.75" stop-color="#a78bfa"/><stop offset="1" stop-color="#f0abfc"/></linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7a7a82"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="900" rx="20" fill="#08080a"/>
  <text x="40" y="42" font-size="24" font-weight="800" fill="#ffffff">Governed Agent Stack — system design</text>
  <text x="40" y="66" font-size="13" fill="#9a9aa3">two gates per call (gateway policy + in-tool) · on-prem topology</text>

  <rect x="28" y="86" width="1144" height="624" rx="16" fill="none" stroke="url(#brand)" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="46" y="106" font-size="11" font-weight="700" fill="#cfcfd6" letter-spacing="1.5">ON-PREM TRUST BOUNDARY · nothing leaves the machine</text>

  <!-- CLIENT -->
  <text x="46" y="132" font-size="10.5" font-weight="700" fill="#6b7280" letter-spacing="1.5">CLIENT (local)</text>
  <rect x="300" y="138" width="250" height="52" rx="10" fill="#141417" stroke="#2a2a30"/>
  <text x="425" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Open WebUI</text>
  <text x="425" y="178" text-anchor="middle" font-size="10.5" fill="#9a9aa3">:8080 · native tool-calling</text>
  <rect x="566" y="138" width="280" height="52" rx="10" fill="#141417" stroke="#2a2a30"/>
  <text x="706" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Ollama</text>
  <text x="706" y="178" text-anchor="middle" font-size="10.5" fill="#9a9aa3">:11434 · qwen3/mistral + nomic-embed</text>

  <line x1="573" y1="190" x2="573" y2="214" stroke="#7a7a82" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="582" y="206" font-size="10" fill="#7a7a82">HTTP · Authorization: Bearer &lt;token&gt;</text>

  <!-- GOVERNANCE GATEWAY (front door) -->
  <text x="46" y="230" font-size="10.5" font-weight="700" fill="#a78bfa" letter-spacing="1.5">GOVERNANCE GATEWAY — gate 1</text>
  <rect x="300" y="214" width="546" height="56" rx="10" fill="#16131a" stroke="#a78bfa" stroke-width="1.8"/>
  <text x="573" y="236" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">governance gateway · :8765</text>
  <text x="573" y="255" text-anchor="middle" font-size="10.5" fill="#c4b5fd">authenticate (token→role) · OPA decision · per-role budget · audit</text>
  <!-- OPA sidecar -->
  <rect x="876" y="214" width="132" height="56" rx="10" fill="#141417" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="942" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">OPA · :8181</text>
  <text x="942" y="254" text-anchor="middle" font-size="10" fill="#9a9aa3">Rego policy</text>
  <line x1="846" y1="236" x2="876" y2="236" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ag)"/>
  <line x1="876" y1="250" x2="846" y2="250" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ag)"/>
  <text x="861" y="231" text-anchor="middle" font-size="8.5" fill="#9a9aa3">ask</text>

  <line x1="573" y1="270" x2="573" y2="290" stroke="#7a7a82" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="582" y="284" font-size="10" fill="#7a7a82">allowed calls only</text>

  <!-- mcpo internal -->
  <rect x="360" y="290" width="426" height="40" rx="9" fill="#101013" stroke="#2a2a30"/>
  <text x="573" y="315" text-anchor="middle" font-size="12.5" font-weight="700" fill="#cfcfd6">mcpo · internal :8766 · spawns each server over stdio</text>

  <!-- fan to tools -->
  <line x1="573" y1="330" x2="118" y2="356" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
  <line x1="573" y1="330" x2="345" y2="356" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
  <line x1="573" y1="330" x2="573" y2="356" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
  <line x1="573" y1="330" x2="801" y2="356" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
  <line x1="573" y1="330" x2="1028" y2="356" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>

  <!-- TOOLS = gate 2 -->
  <text x="46" y="350" font-size="10.5" font-weight="700" fill="#6b7280" letter-spacing="1.5">GOVERNED TOOLS — gate 2, fires before the backend</text>
  <g font-size="10.5">
    <rect x="18"   y="356" width="200" height="84" rx="10" fill="#141417" stroke="#2a2a30"/>
    <text x="118" y="379" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">schema-scout</text>
    <text x="118" y="399" text-anchor="middle" fill="#5eead4">read-only catalog</text><text x="118" y="415" text-anchor="middle" fill="#9a9aa3">PII flagged per column</text>

    <rect x="245"  y="356" width="200" height="84" rx="10" fill="#141417" stroke="#2a2a30"/>
    <text x="345" y="379" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">sql-steward</text>
    <text x="345" y="399" text-anchor="middle" fill="#60a5fa">compile-only · no run_sql</text><text x="345" y="415" text-anchor="middle" fill="#9a9aa3">PII fields refused</text>

    <rect x="473"  y="356" width="200" height="84" rx="10" fill="#141417" stroke="#2a2a30"/>
    <text x="573" y="379" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">kql-sop</text>
    <text x="573" y="399" text-anchor="middle" fill="#fb7185">lint gate · refuse mutations</text><text x="573" y="415" text-anchor="middle" fill="#9a9aa3">execution is the only path</text>

    <rect x="701"  y="356" width="200" height="84" rx="10" fill="#141417" stroke="#2a2a30"/>
    <text x="801" y="379" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">doc-steward</text>
    <text x="801" y="399" text-anchor="middle" fill="#c4b5fd">role filter · PII redact</text><text x="801" y="415" text-anchor="middle" fill="#9a9aa3">on retrieved chunks</text>

    <rect x="928"  y="356" width="200" height="84" rx="10" fill="#141417" stroke="#2a2a30"/>
    <text x="1028" y="379" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">thread-recall</text>
    <text x="1028" y="399" text-anchor="middle" fill="#86efac">mask-on-write · scoped</text><text x="1028" y="415" text-anchor="middle" fill="#9a9aa3">thread isolation</text>
  </g>

  <!-- in-tool governance rail -->
  <rect x="18" y="466" width="1110" height="54" rx="10" fill="#100e14" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="34" y="487" font-size="10.5" font-weight="700" fill="#c4b5fd" letter-spacing="1">IN-TOOL GOVERNANCE · invoked by every tool</text>
  <text x="120" y="509" font-size="12" font-weight="700" fill="#fff">query-warden <tspan font-weight="400" fill="#9a9aa3">RBAC</tspan></text>
  <text x="430" y="509" font-size="12" font-weight="700" fill="#fff">pii-veil <tspan font-weight="400" fill="#9a9aa3">mask / redact</tspan></text>
  <text x="700" y="509" font-size="12" font-weight="700" fill="#fff">agent-blackbox <tspan font-weight="400" fill="#9a9aa3">hash-chained audit (gateway + tools)</tspan></text>
  <line x1="118" y1="440" x2="118" y2="466" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#ag)"/>
  <line x1="345" y1="440" x2="345" y2="466" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#ag)"/>
  <line x1="573" y1="440" x2="573" y2="466" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#ag)"/>
  <line x1="801" y1="440" x2="801" y2="466" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#ag)"/>
  <line x1="1028" y1="440" x2="1028" y2="466" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#ag)"/>

  <!-- STORES -->
  <text x="46" y="546" font-size="10.5" font-weight="700" fill="#6b7280" letter-spacing="1.5">STORES (on-prem)</text>
  <g font-size="10.5" fill="#9a9aa3">
    <line x1="118" y1="520" x2="118" y2="556" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
    <line x1="345" y1="520" x2="345" y2="556" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
    <line x1="573" y1="520" x2="573" y2="556" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
    <line x1="801" y1="520" x2="801" y2="556" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
    <line x1="1028" y1="520" x2="1028" y2="556" stroke="#7a7a82" stroke-width="1.1" marker-end="url(#a)"/>
    <rect x="38" y="556" width="160" height="38" rx="8" fill="#0e0e11" stroke="#26262b"/><text x="118" y="580" text-anchor="middle">catalog.json</text>
    <rect x="265" y="556" width="160" height="38" rx="8" fill="#0e0e11" stroke="#26262b"/><text x="345" y="580" text-anchor="middle">SQLite / Postgres</text>
    <rect x="493" y="556" width="160" height="38" rx="8" fill="#0e0e11" stroke="#26262b"/><text x="573" y="580" text-anchor="middle">KQL cluster (opt)</text>
    <rect x="721" y="556" width="160" height="38" rx="8" fill="#0e0e11" stroke="#26262b"/><text x="801" y="580" text-anchor="middle">corpus (+pgvector)</text>
    <rect x="948" y="556" width="160" height="38" rx="8" fill="#0e0e11" stroke="#26262b"/><text x="1028" y="580" text-anchor="middle">memory.db</text>
  </g>

  <text x="573" y="640" text-anchor="middle" font-size="11.5" fill="#cfcfd6">Two gates per call: <tspan font-weight="700" fill="#fff">policy at the gateway</tspan>, <tspan font-weight="700" fill="#fff">enforcement in the tool</tspan> · no run_sql, no write path, no cloud call</text>
  <text x="573" y="662" text-anchor="middle" font-size="10.5" fill="#7a7a82">a policy mistake at the gateway still cannot make a tool misbehave</text>

  <!-- LIFECYCLE -->
  <text x="40" y="724" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1.5">REQUEST LIFECYCLE</text>
  <g font-size="10.5">
    <g transform="translate(40,736)"><rect width="172" height="58" rx="9" fill="#141417" stroke="#2a2a30"/><circle cx="20" cy="20" r="11" fill="url(#brand)"/><text x="20" y="24" text-anchor="middle" font-size="11" font-weight="800" fill="#08080a">1</text><text x="38" y="24" font-weight="700" fill="#fff">Authenticate</text><text x="12" y="46" fill="#9a9aa3">token → role</text></g>
    <g transform="translate(232,736)"><rect width="172" height="58" rx="9" fill="#141417" stroke="#2a2a30"/><circle cx="20" cy="20" r="11" fill="url(#brand)"/><text x="20" y="24" text-anchor="middle" font-size="11" font-weight="800" fill="#08080a">2</text><text x="38" y="24" font-weight="700" fill="#fff">Authorize</text><text x="12" y="46" fill="#9a9aa3">OPA allow / deny</text></g>
    <g transform="translate(424,736)"><rect width="172" height="58" rx="9" fill="#141417" stroke="#2a2a30"/><circle cx="20" cy="20" r="11" fill="url(#brand)"/><text x="20" y="24" text-anchor="middle" font-size="11" font-weight="800" fill="#08080a">3</text><text x="38" y="24" font-weight="700" fill="#fff">Gate</text><text x="12" y="46" fill="#9a9aa3">in-tool check</text></g>
    <g transform="translate(616,736)"><rect width="172" height="58" rx="9" fill="#141417" stroke="#2a2a30"/><circle cx="20" cy="20" r="11" fill="url(#brand)"/><text x="20" y="24" text-anchor="middle" font-size="11" font-weight="800" fill="#08080a">4</text><text x="38" y="24" font-weight="700" fill="#fff">Read</text><text x="12" y="46" fill="#9a9aa3">read-only on store</text></g>
    <g transform="translate(808,736)"><rect width="172" height="58" rx="9" fill="#141417" stroke="#2a2a30"/><circle cx="20" cy="20" r="11" fill="url(#brand)"/><text x="20" y="24" text-anchor="middle" font-size="11" font-weight="800" fill="#08080a">5</text><text x="38" y="24" font-weight="700" fill="#fff">Mask</text><text x="12" y="46" fill="#9a9aa3">pii-veil before return</text></g>
    <g transform="translate(1000,736)"><rect width="160" height="58" rx="9" fill="#141417" stroke="#2a2a30"/><circle cx="20" cy="20" r="11" fill="url(#brand)"/><text x="20" y="24" text-anchor="middle" font-size="11" font-weight="800" fill="#08080a">6</text><text x="38" y="24" font-weight="700" fill="#fff">Audit</text><text x="12" y="46" fill="#9a9aa3">hash-chained log</text></g>
    <line x1="212" y1="765" x2="230" y2="765" stroke="#7a7a82" stroke-width="1.2" marker-end="url(#a)"/>
    <line x1="404" y1="765" x2="422" y2="765" stroke="#7a7a82" stroke-width="1.2" marker-end="url(#a)"/>
    <line x1="596" y1="765" x2="614" y2="765" stroke="#7a7a82" stroke-width="1.2" marker-end="url(#a)"/>
    <line x1="788" y1="765" x2="806" y2="765" stroke="#7a7a82" stroke-width="1.2" marker-end="url(#a)"/>
    <line x1="980" y1="765" x2="998" y2="765" stroke="#7a7a82" stroke-width="1.2" marker-end="url(#a)"/>
  </g>
</svg>
